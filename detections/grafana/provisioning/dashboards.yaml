# Grafana dashboard provisioning: auto-loads the JSON dashboards under
# detections/grafana/dashboards/ (mounted at /var/lib/grafana/dashboards in
# the compose stack) so `docker compose up` brings up Grafana with both
# dashboards already present -- no manual import needed.

apiVersion: 1

providers:
  - name: gopherguard
    orgId: 1
    folder: gopherguard
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
