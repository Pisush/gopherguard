# Minimal Grafana Tempo config for local dev: local-disk storage backend,
# OTLP receiver (fed by the OTel Collector's otlp/tempo exporter -- see
# detections/otel-collector-config.yaml), and TraceQL query support enabled
# by default in modern Tempo.

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

compactor:
  compaction:
    block_retention: 336h # 14 days

storage:
  trace:
    backend: local
    local:
      path: /var/tempo/traces
    wal:
      path: /var/tempo/wal

query_frontend:
  search:
    duration_slo: 5s
    throughput_bytes_slo: 1.073741824e+09

overrides:
  defaults:
    metrics_generator:
      processors:
        - service-graphs
        - span-metrics
